<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIXIR</title>

    <!-- React , Babel -->
    <script src="https://unpkg.com/react/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Protest+Revolution&family=Doto:wght@100..900&family=Shadows+Into+Light&family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        /* Base styles */
        :root {
            --bg-color-light: #ffffff;
            --text-color-light: #000000;
            --bg-color-dark: #111111;
            --text-color-dark: #ffffff;
        }

        /* Light mode (default) */
        html {
            background-color: var(--bg-color-light);
            color: var(--text-color-light);
        }

        /* Dark mode */
        html.dark {
            background-color: var(--bg-color-dark);
            color: var(--text-color-dark);
        }

        /* General body and html */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Doto', sans-serif;
            overflow: hidden; /* Hide scrollbars */
            overflow: scroll;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 0;
        }

        /* Ensure root container is centered */
        #root {
            width: 100%;
            overflow: auto; /* Enable scrolling within the root */
            height: 100vh; /* Ensure it takes full viewport height */
        }

        .loading-screen {
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            font-family: 'Shadows Into Light', cursive;
            position: relative;
        }

        /* Hide scrollbars while loading */
        body.loading {
            overflow: hidden;
        }

        /* Loading screen styling */
        .loading-screen {
            position: absolute; /* Center on the screen */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            font-family: 'Shadows Into Light', cursive;
            color: white;
        }

        .moving-text span {
            display: inline-block;
            animation: move 4s infinite;
        }

        /* Keyframe animations effects */
        @keyframes move {
            0% { transform: translateX(0); opacity: 1; }
            50% { transform: translateX(20px); opacity: 1; }
            100% { transform: translateX(0); opacity: 1; }
        }

        /* Animation letter */
        .moving-text span {
            display: inline-block;
            animation: move 4s ease-in-out infinite;
        }

        /* animation delay */
        .moving-text span:nth-child(1) { animation-delay: 0s; }
        .moving-text span:nth-child(2) { animation-delay: 0.4s; }
        .moving-text span:nth-child(3) { animation-delay: 0.8s; }
        .moving-text span:nth-child(4) { animation-delay: 1.2s; }
        .moving-text span:nth-child(5) { animation-delay: 1.6s; }
        .moving-text span:nth-child(6) { animation-delay: 2s; }

        .text-9xl {
            font-size: 6rem;
        }

        @media (min-width: 768px) {
            .text-9xl {
                font-size: 8rem;
            }
        }

        @media (min-width: 1024px) {
            .text-9xl {
                font-size: 9rem;
            }
        }

        .protest-revolution {
            font-family: 'Protest Revolution', sans-serif;
        }

        .shadows-into-light {
            font-family: 'Shadows Into Light', cursive;
        }

        .anton {
            font-family: 'Anton', sans-serif;
        }

        footer {
            font-family: 'Inter', sans-serif;
        }

        .page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .md\:flex-row {
            flex-direction: row;
        }

        .items-center {
            align-items: center;
        }

        .justify-center {
            justify-content: center;
        }

        .min-h-screen {
            min-height: 100vh;
        }

        .max-w-full {
            max-width: 100%;
        }

        .h-auto {
            height: auto;
        }

        .p-8 {
            padding: 2rem;
        }

        .py-16 {
            padding-top: 4rem;
            padding-bottom: 4rem;
        }

        .text-white {
            color: #ffffff;
        }

        .text-gray-500 {
            color: #6b7280;
        }

        .text-gray-300 {
            color: #d1d5db;
        }

        .text-2xl {
            font-size: 1.5rem;
        }

        .font-bold {
            font-weight: bold;
        }

        .font-semibold {
            font-weight: 600;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .uppercase {
            text-transform: uppercase;
        }

        .space-x-2 > * + * {
            margin-left: 0.5rem;
        }

        .bg-gray-200 {
            background-color: #e5e7eb;
        }

        .bg-gray-400 {
            background-color: #9ca3af;
        }

        .bg-gray-300 {
            background-color: #d1d5db;
        }

        .border {
            border-width: 1px;
            border-color: #e5e7eb;
        }

        .list-disc {
            list-style-type: disc;
        }

        .list-inside {
            list-style-position: inside;
        }

        .w-8 {
            width: 2rem;
        }

        .h-8 {
            height: 2rem;
        }

        .w-10 {
            width: 2.5rem;
        }

        .h-10 {
            height: 2.5rem;
        }

        .w-full {
            width: 100%;
        }

        .py-3 {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--bg-color-dark);
        }
    </style>
</head>
<body>
    <!-- React Root -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const artists = ["RARI", "EMURACS", "SITAN", "SANDAN", "BELLATTIX", "AKMET"];

        function LoadingScreen() {
            const [currentArtistIndex, setCurrentArtistIndex] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentArtistIndex((prevIndex) => (prevIndex + 1) % artists.length);
                }, 500);

                return () => clearInterval(interval);
            }, []);

            return (
                <div className="loading-screen">
                    {artists[currentArtistIndex]}
                </div>
            );
        }

        function DarkModeToggle() {
            const [isDarkMode, setIsDarkMode] = useState(true);

            useEffect(() => {
                document.documentElement.classList.toggle("dark", isDarkMode);
            }, [isDarkMode]);

            return (
                <button
                    onClick={() => setIsDarkMode(!isDarkMode)}
                    className="p-2 border border-gray-700 rounded-full text-lg flex items-center text-white"
                    aria-label="Toggle dark/light mode"
                >
                    <span className="material-symbols-outlined">
                        {isDarkMode ? "light_mode" : "dark_mode"}
                    </span>
                </button>
            );
        }

        function Header() {
            return (
                <header className="w-full flex justify-between items-center p-4 border-b border-gray-700 sticky-header">
                    <div className="text-2xl anton text-white">ELIXIR KOMBINAT</div>
                    <div className="flex items-center space-x-4">
                        <DarkModeToggle />
                        <button
                            className="p-2 border border-gray-700 rounded-full text-lg flex items-center text-white"
                            aria-label="Shopping cart"
                        >
                            <span className="material-symbols-outlined">shopping_cart</span>
                        </button>
                    </div>
                </header>
            );
        }

        function FirstPage() {
            return (
                <div className="page">
                    <main className="flex flex-col items-center justify-center flex-grow">
                        <div className="text-9xl font-bold flex space-x-2 moving-text protest-revolution">
                            <span>E</span>
                            <span>L</span>
                            <span>I</span>
                            <span>X</span>
                            <span>I</span>
                            <span>R</span>
                        </div>
                        <div className="mt-8 text-center text-base max-w-md shadows-into-light">    
                            WE'RE A GROUP OF YOUNG PEOPLE STARTING OUR OWN CLOTHING BRAND /STARTING FROM THE BOTTOM/
                        </div>
                        <div className="mt-8 text-center max-w-md shadows-into-light custom-text">
                            COMING SOON
                        </div>
                    </main>

                    <footer className="absolute bottom-4 right-4 text-xs">©ELIXIR</footer>
                </div>
            );
        }

        function SecondPage() {
            const [color, setColor] = useState('white');
            const [size, setSize] = useState(null);

            const handleColorChange = (selectedColor) => {
                setColor(selectedColor);
            };

            const handleSizeChange = (selectedSize) => {
                setSize(selectedSize);
            };

            return (
                <div className="flex flex-col md:flex-row items-center justify-center min-h-screen">
                    <div className="flex-1 flex justify-center items-center py-16">
                        <img 
                            src={color === 'white' ? "https://scontent.xx.fbcdn.net/v/t1.15752-9/462640541_945886270932159_6539109642020267179_n.png?_nc_cat=100&ccb=1-7&_nc_sid=0024fc&_nc_ohc=N_ZfkwkywlwQ7kNvgFfbv0z&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&oh=03_Q7cD1QFb7T_WG8vJAgZ1cyDUZBo0htL_2sTx-zRdCDNBUKlwPA&oe=676D06E5" : "https://scontent.xx.fbcdn.net/v/t1.15752-9/467456551_1551865892117034_5121929888317865367_n.png?_nc_cat=106&ccb=1-7&_nc_sid=0024fc&_nc_ohc=vJr4xZmleH4Q7kNvgFg8Nyn&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&oh=03_Q7cD1QHWfRRQ4222_hVFiE1eZnUW6QXJBojUx2DPbnprdHbVvg&oe=676D2249"} 
                            alt={color === 'white' ? "Front view of a person wearing a white t-shirt and black pants" : "Front view of a person wearing a black t-shirt and black pants"} 
                            className="max-w-full h-auto" 
                        />
                    </div>
                    <div className="flex-1 flex justify-center items-center py-16">
                        <img 
                            src={color === 'white' ? "https://scontent.xx.fbcdn.net/v/t1.15752-9/462651984_568499015787094_1822036645189832070_n.png?_nc_cat=103&ccb=1-7&_nc_sid=0024fc&_nc_ohc=mrr72gd_wxIQ7kNvgFAqfXD&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&oh=03_Q7cD1QE-pwRzNX2QMFcpEzo3duujrPgHZZSw2seJiokMcYxOIg&oe=676D0524" : "https://scontent.xx.fbcdn.net/v/t1.15752-9/462566793_1844242612782313_1092920384243102010_n.png?_nc_cat=103&ccb=1-7&_nc_sid=0024fc&_nc_ohc=8VkghS2q3twQ7kNvgG4xbRX&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&oh=03_Q7cD1QHNqyxTB3UFKzo_XagKZLX1_JuIpeSvOV8WFFt10ohhgQ&oe=676E5A96"} 
                            alt={color === 'white' ? "Side view of a person wearing a white t-shirt and black pants" : "Side view of a person wearing a black t-shirt and black pants"} 
                            className="max-w-full h-auto" 
                        />
                    </div>
                    <div className="flex-1 p-8">
                        <h1 className="text-2xl font-bold mb-4 text-current">Elixir TEE</h1>
                        <div className="text-2xl font-semibold mb-4 text-current">₮69.000</div>
                        <p
                          className="mb-4 text-current"
                          style={{ fontSize: '18px' }}
                        >
                            A fresh skater-inspired collection designed for comfort and freedom of movement. This tee showcases a subtle logo on the front and a bold, oversized arrow design on the back, crafted from bolts and screws. Made from 100% cotton.
                        </p>
                        <div className="text-sm uppercase text-gray-500 mb-2">Colors:</div>
                        <div className="flex items-center mb-4 space-x-2">
                            <div 
                                className={`w-8 h-8 border border-gray-300 ${color === 'white' ? 'bg-gray-200' : ''}`} 
                                onClick={() => handleColorChange('white')}
                            ></div>
                            <div 
                                className={`w-8 h-8 border border-gray-300 ${color === 'black' ? 'bg-gray-400' : ''}`} 
                                onClick={() => handleColorChange('black')}
                            ></div>
                        </div>
                        <div className="text-sm uppercase text-gray-500 mb-2">Sizes:</div>
                        <div className="flex space-x-2 mb-4">
                            <button 
                                className={`w-10 h-10 border border-gray-300 text-current ${size === 'M' ? 'bg-gray-300' : ''}`} 
                                onClick={() => handleSizeChange('M')}
                            >
                                M
                            </button>
                            <button 
                                className={`w-10 h-10 border border-gray-300 text-current ${size === 'L' ? 'bg-gray-300' : ''}`} 
                                onClick={() => handleSizeChange('L')}
                            >
                                L
                            </button>
                            <button 
                                className={`w-10 h-10 border border-gray-300 text-current ${size === 'XL' ? 'bg-gray-300' : ''}`} 
                                onClick={() => handleSizeChange('XL')}
                            >
                                XL
                            </button>
                        </div>
                        <button className="w-full bg-white text-black py-3 mb-4">Add to Cart</button>
                        <div className="text-sm text-gray-500 mb-2">Payment Methods:</div>
                        <ul className="text-sm text-gray-500 list-disc list-inside">
                            <li>coming soon</li>
                            <li>mdkue</li>
                        </ul>
                    </div>
                </div>
            );
        }

        function Main() {
            const [loading, setLoading] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(true); // Start with dark mode enabled

            useEffect(() => {
                // Toggle dark mode
                if (isDarkMode) {
                    document.documentElement.classList.add("dark");
                } else {
                    document.documentElement.classList.remove("dark");
                }
            }, [isDarkMode]);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setLoading(false);
                    // Allow scrolling after loading is complete
                    document.body.classList.remove('loading');
                }, 3000); // Keep loading for 3 seconds

                // Add class to hide scrollbars while loading
                document.body.classList.add('loading');

                return () => clearTimeout(timer);
            }, []);

            return (
                <div>
                    {loading ? <LoadingScreen /> : (
                        <div id="scroll-container">
                            <Header />
                            <FirstPage />
                            <SecondPage />
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<Main />, document.getElementById("root"));
    </script>
</body>
</html>
